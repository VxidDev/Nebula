<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат - Nebula</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: 40px;
        }

        .message.other {
            background: white;
            color: #333;
            margin-right: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message .username {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .message .text {
            word-wrap: break-word;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            gap: 10px;
        }

        .chat-input input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input input[type="text"]:focus {
            border-color: #667eea;
        }

        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .chat-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .username-input {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .username-input input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .username-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .status {
            text-align: center;
            padding: 8px;
            font-size: 0.85rem;
            color: #6c757d;
            background: #f8f9fa;
        }

        .status.connected {
            color: #28a745;
        }

        .status.disconnected {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>💬 Nebula Chat</h1>
        </div>

        <div class="username-input">
            <input type="text" id="username" placeholder="Ваше имя..." value="Гость">
        </div>

        <div class="status" id="status">Подключение...</div>

        <div class="chat-messages" id="messages"></div>

        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." autofocus>
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        const socket = io();
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const usernameInput = document.getElementById('username');
        const statusDiv = document.getElementById('status');

        socket.on('connect', () => {
            statusDiv.textContent = '✓ Подключено';
            statusDiv.className = 'status connected';
        });

        socket.on('disconnect', () => {
            statusDiv.textContent = '✗ Отключено';
            statusDiv.className = 'status disconnected';
        });

        socket.on('new_message', (data) => {
            addMessage(data.username, data.message, data.username === usernameInput.value);
        });

        socket.on('connect_error', (error) => {
            console.error('Connection error:', error);
            statusDiv.textContent = '✗ Ошибка подключения';
            statusDiv.className = 'status disconnected';
        });

        function addMessage(username, text, isOwn) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
            messageDiv.innerHTML = `
                <div class="username">${escapeHtml(username)}</div>
                <div class="text">${escapeHtml(text)}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            const username = usernameInput.value.trim() || 'Аноним';

            if (message) {
                socket.emit('message', { username, message });
                messageInput.value = '';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        usernameInput.addEventListener('change', () => {
            localStorage.setItem('chat_username', usernameInput.value);
        });

        // Загрузка сохранённого имени
        const savedUsername = localStorage.getItem('chat_username');
        if (savedUsername) {
            usernameInput.value = savedUsername;
        }
    </script>
</body>
</html>
