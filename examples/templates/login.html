<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Nebula Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #7c6af7;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
    }

    .error {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      color: #e2e8f0;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 18px;
    }

    input:focus {
      border-color: #7c6af7;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #7c6af7;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background .15s;
    }

    button:hover { background: #6c5ce7; }

    .hint {
      margin-top: 24px;
      font-size: 13px;
      color: #475569;
      text-align: center;
    }

    .hint code {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⬡ Nebula Chat</div>
    <div class="subtitle">Войдите, чтобы начать общение</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label for="username">Имя пользователя</label>
      <input id="username" name="username" type="text"
             placeholder="alice" autocomplete="username" required />

      <label for="password">Пароль</label>
      <input id="password" name="password" type="password"
             placeholder="••••••••" autocomplete="current-password" required />

      <button type="submit">Войти</button>
    </form>

    <p class="hint">
      Тестовые аккаунты: <code>alice / password</code> · <code>bob / secret</code>
    </p>
  </div>
</body>
</html>
