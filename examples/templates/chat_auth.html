<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebula Chat</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }

    .logo { font-size: 18px; font-weight: 700; color: #7c6af7; letter-spacing: -.5px; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #7c6af7;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
      color: #fff;
      flex-shrink: 0;
    }

    .username { color: #94a3b8; }

    .logout-btn {
      padding: 5px 14px;
      background: transparent;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #64748b;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .15s, color .15s;
    }
    .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

    /* ── Status bar ── */
    #status-bar {
      text-align: center;
      font-size: 12px;
      padding: 5px;
      background: #12151f;
      color: #475569;
      flex-shrink: 0;
    }
    #status-bar.connected { color: #34d399; background: rgba(52,211,153,.06); }
    #status-bar.disconnected { color: #f87171; background: rgba(248,113,113,.06); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

    .msg {
      display: flex;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      max-width: 780px;
      transition: background .1s;
    }
    .msg:hover { background: rgba(255,255,255,.03); }

    .msg.own { flex-direction: row-reverse; align-self: flex-end; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px;
      color: #fff;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-body { display: flex; flex-direction: column; gap: 2px; }
    .msg.own .msg-body { align-items: flex-end; }

    .msg-meta {
      display: flex; align-items: baseline; gap: 8px;
      font-size: 12px; color: #475569;
    }
    .msg-name { font-weight: 600; color: #7c6af7; }
    .msg.own .msg-name { color: #34d399; }
    .msg-time { font-size: 11px; }

    .msg-text {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.5;
      word-break: break-word;
    }

    .system-msg {
      text-align: center;
      font-size: 12px;
      color: #475569;
      padding: 4px 0;
      font-style: italic;
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px;
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 15px;
      color: #e2e8f0;
      outline: none;
      transition: border-color .15s;
      resize: none;
    }
    #msg-input:focus { border-color: #7c6af7; }
    #msg-input::placeholder { color: #475569; }

    #send-btn {
      padding: 0 22px;
      background: #7c6af7;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: #6c5ce7; }
    #send-btn:disabled { background: #2d3148; color: #475569; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <span class="logo">⬡ Nebula Chat</span>
    <div class="user-info">
      <div class="avatar" id="header-avatar">{{ username[0].upper() }}</div>
      <span class="username">{{ username }}</span>
      <a href="/logout" class="logout-btn">Выйти</a>
    </div>
  </header>

  <div id="status-bar">Подключение...</div>

  <div id="messages"></div>

  <div class="input-area">
    <input id="msg-input" type="text" placeholder="Написать сообщение..." maxlength="500" />
    <button id="send-btn" disabled>Отправить</button>
  </div>

  <script>
    const ME = {{ username | tojson }};

    // Colour per first letter (deterministic)
    const COLOURS = [
      '#7c6af7','#34d399','#f59e0b','#60a5fa',
      '#f472b6','#a78bfa','#2dd4bf','#fb923c'
    ];
    function userColour(name) {
      let h = 0;
      for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
      return COLOURS[h % COLOURS.length];
    }

    const messagesEl = document.getElementById('messages');
    const statusBar  = document.getElementById('status-bar');
    const input      = document.getElementById('msg-input');
    const sendBtn    = document.getElementById('send-btn');

    document.getElementById('header-avatar').style.background = userColour(ME);

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addSystemMsg(text) {
      const d = document.createElement('div');
      d.className = 'system-msg';
      d.textContent = text;
      messagesEl.appendChild(d);
      scrollBottom();
    }

    function addMessage({ username, message, time }) {
      const isOwn = username === ME;
      const colour = userColour(username);

      const wrapper = document.createElement('div');
      wrapper.className = 'msg' + (isOwn ? ' own' : '');

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.style.background = colour;
      avatar.textContent = username[0].toUpperCase();

      const body = document.createElement('div');
      body.className = 'msg-body';

      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'msg-name';
      nameSpan.textContent = username;
      const timeSpan = document.createElement('span');
      timeSpan.className = 'msg-time';
      timeSpan.textContent = time;
      meta.append(nameSpan, timeSpan);

      const text = document.createElement('div');
      text.className = 'msg-text';
      text.textContent = message;

      body.append(meta, text);
      wrapper.append(avatar, body);
      messagesEl.appendChild(wrapper);
      scrollBottom();
    }

    // ── Socket.IO ──────────────────────────────────────────────────────
    const socket = io({ transports: ['websocket', 'polling'] });

    socket.on('connect', () => {
      statusBar.textContent = '● Подключено';
      statusBar.className = 'connected';
      sendBtn.disabled = false;
    });

    socket.on('disconnect', () => {
      statusBar.textContent = '○ Соединение прервано';
      statusBar.className = 'disconnected';
      sendBtn.disabled = true;
    });

    socket.on('history', (msgs) => {
      msgs.forEach(addMessage);
    });

    socket.on('new_message', addMessage);

    socket.on('user_joined', ({ username }) => {
      addSystemMsg(`${username} присоединился к чату`);
    });

    socket.on('user_left', ({ username }) => {
      addSystemMsg(`${username} покинул чат`);
    });

    // ── Send ───────────────────────────────────────────────────────────
    function sendMessage() {
      const text = input.value.trim();
      if (!text || !socket.connected) return;
      socket.emit('message', { message: text });
      input.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
